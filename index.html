<style>
  /* ================= DESIGN SYSTEM ================= */
  :root[data-theme="light"] {
    --primary: #dc2626;
    --primary-hover: #b91c1c;
    --primary-light: #fef2f2;
    --primary-ring: rgba(220, 38, 38, 0.2);
    --bg-main: #f8fafc;
    --bg-card: rgba(255, 255, 255, 0.95);
    --text-primary: #0f172a;
    --text-secondary: #64748b;
    --border-color: #e2e8f0;
    --input-bg: #f1f5f9;
    --success: #10b981;
    --danger: #ef4444;
    --warning: #f59e0b;
    --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
    --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
    --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
    --shadow-glow: 0 10px 25px -5px rgba(220, 38, 38, 0.3);
  }

  :root[data-theme="dark"] {
    --primary: #ef4444;
    --primary-hover: #f87171;
    --primary-light: rgba(239, 68, 68, 0.1);
    --primary-ring: rgba(239, 68, 68, 0.3);
    --bg-main: #020617;
    --bg-card: rgba(15, 23, 42, 0.85);
    --text-primary: #f8fafc;
    --text-secondary: #94a3b8;
    --border-color: #1e293b;
    --input-bg: #0f172a;
    --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.5);
    --shadow-lg: 0 10px 25px -3px rgba(0, 0, 0, 0.7);
    --shadow-glow: 0 10px 25px -5px rgba(239, 68, 68, 0.4);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Plus Jakarta Sans', sans-serif;
    background-color: var(--bg-main);
    color: var(--text-primary);
    transition: background-color 0.4s ease, color 0.4s ease;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    overflow-x: hidden;
  }

  /* Animated Background Elements */
  .bg-shape { position: fixed; border-radius: 50%; filter: blur(80px); z-index: -1; opacity: 0.5; animation: float 15s ease-in-out infinite alternate; pointer-events: none;}
  .shape-1 { top: -10%; left: -10%; width: 40vw; height: 40vw; background: rgba(220, 38, 38, 0.15); animation-delay: 0s; }
  .shape-2 { bottom: -10%; right: -10%; width: 40vw; height: 40vw; background: rgba(16, 185, 129, 0.15); animation-delay: -5s; }
  :root[data-theme="dark"] .shape-1 { background: rgba(220, 38, 38, 0.25); }
  :root[data-theme="dark"] .shape-2 { background: rgba(59, 130, 246, 0.2); }

  @keyframes float { 0% { transform: translate(0, 0) scale(1); } 100% { transform: translate(50px, 50px) scale(1.1); } }

  /* Layout */
  .header { display: flex; justify-content: space-between; align-items: center; padding: 20px 24px; max-width: 600px; width: 100%; margin: 0 auto; }
  .theme-toggle { background: var(--input-bg); border: 1px solid var(--border-color); color: var(--text-primary); width: 44px; height: 44px; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: all 0.3s; }
  .theme-toggle:hover { background: var(--border-color); }
  
  .container { width: 100%; max-width: 600px; margin: 0 auto 40px; padding: 0 16px; position: relative; z-index: 1; flex: 1; }

  /* Glassmorphic Card */
  .card {
    background: var(--bg-card);
    backdrop-filter: blur(24px);
    -webkit-backdrop-filter: blur(24px);
    border-radius: 32px;
    padding: 40px 32px;
    box-shadow: var(--shadow-lg);
    border: 1px solid var(--border-color);
    margin-bottom: 24px;
    animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1);
  }

  @keyframes slideUp { 0% { opacity: 0; transform: translateY(40px); } 100% { opacity: 1; transform: translateY(0); } }

  .header-content { text-align: center; margin-bottom: 32px; }
  .title { font-size: 28px; font-weight: 800; letter-spacing: -0.5px; margin-bottom: 8px; }
  .subtitle { color: var(--text-secondary); font-size: 15px; font-weight: 500; }

  /* Status Banner */
  .status-banner {
    display: flex; align-items: center; justify-content: center; gap: 12px;
    padding: 14px 20px; border-radius: 16px; margin-bottom: 24px; font-weight: 600; font-size: 14px;
    border: 1px solid transparent; transition: all 0.3s;
  }
  .pulse { width: 10px; height: 10px; border-radius: 50%; box-shadow: 0 0 0 0 rgba(0,0,0,0.5); animation: pulsing 2s infinite; }
  @keyframes pulsing { 0% { transform: scale(0.95); box-shadow: 0 0 0 0 var(--pulse-color); } 70% { transform: scale(1); box-shadow: 0 0 0 10px rgba(0,0,0,0); } 100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(0,0,0,0); } }

  /* Input & Forms */
  .input-group { margin-bottom: 24px; position: relative; }
  .input-label { display: block; font-size: 14px; font-weight: 700; color: var(--text-secondary); margin-bottom: 10px; text-transform: uppercase; letter-spacing: 0.5px; }
  .input-wrapper { position: relative; }
  .input-icon { position: absolute; left: 16px; top: 50%; transform: translateY(-50%); color: var(--text-secondary); pointer-events: none; transition: color 0.3s; }
  
  input.form-control, select.form-control {
    width: 100%; padding: 18px 20px 18px 48px; border-radius: 16px; border: 2px solid var(--border-color);
    background: var(--input-bg); color: var(--text-primary); font-family: inherit; font-size: 16px; font-weight: 600;
    transition: all 0.3s ease; appearance: none;
  }
  input.form-control:focus, select.form-control:focus { background: transparent; border-color: var(--primary); box-shadow: 0 0 0 4px var(--primary-ring); outline: none; }
  input.form-control:focus + .input-icon { color: var(--primary); }

  /* Modern Calendar Grid for Shifts */
  .calendar-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; margin-bottom: 32px; }
  .day-card { background: var(--input-bg); border: 1px solid var(--border-color); border-radius: 16px; padding: 16px; transition: all 0.3s; }
  .day-card:focus-within { border-color: var(--primary); background: transparent; box-shadow: 0 4px 12px var(--primary-ring); }
  .day-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; font-weight: 700; color: var(--text-primary); }
  .day-select { width: 100%; padding: 12px 16px; border-radius: 10px; border: 1px solid var(--border-color); background: var(--bg-card); color: var(--text-primary); font-weight: 600; font-family: inherit; cursor: pointer; outline: none; }
  .day-select:focus { border-color: var(--primary); }

  /* Buttons */
  .btn {
    width: 100%; padding: 18px; border-radius: 16px; font-family: inherit; font-size: 16px; font-weight: 700;
    cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px;
    transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); border: none; position: relative; overflow: hidden;
  }
  .btn-primary { background: var(--primary); color: white; box-shadow: var(--shadow-glow); }
  .btn-primary:hover:not(:disabled) { background: var(--primary-hover); transform: translateY(-3px); box-shadow: 0 15px 30px -5px rgba(220,38,38,0.5); }
  .btn-primary:active:not(:disabled) { transform: translateY(1px); }
  .btn-primary:disabled { opacity: 0.7; cursor: not-allowed; transform: none; box-shadow: none; }
  
  .btn-outline { background: transparent; border: 2px solid var(--border-color); color: var(--text-primary); margin-top: 16px; }
  .btn-outline:hover { background: var(--input-bg); border-color: var(--text-secondary); }

  /* Dashboard Stats */
  .stats-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; margin-bottom: 32px; }
  .stat-card { background: var(--primary-light); padding: 20px; border-radius: 20px; text-align: center; border: 1px solid var(--primary-ring); }
  .stat-val { font-size: 32px; font-weight: 800; color: var(--primary); margin-bottom: 4px; font-variant-numeric: tabular-nums; }
  .stat-label { font-size: 13px; font-weight: 700; color: var(--text-secondary); text-transform: uppercase; }

  /* Table */
  .table-wrapper { overflow-x: auto; border-radius: 16px; border: 1px solid var(--border-color); background: var(--bg-card); }
  table { width: 100%; border-collapse: collapse; font-size: 14px; }
  th { background: var(--input-bg); color: var(--text-secondary); font-weight: 700; text-transform: uppercase; padding: 16px; text-align: center; border-bottom: 2px solid var(--border-color); white-space: nowrap; }
  th:first-child { text-align: left; position: sticky; left: 0; z-index: 10; }
  td { padding: 16px; text-align: center; border-bottom: 1px solid var(--border-color); font-weight: 600; white-space: nowrap; }
  td:first-child { text-align: left; position: sticky; left: 0; background: var(--bg-card); border-right: 1px solid var(--border-color); }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: var(--input-bg); }

  /* iOS PIN Keypad */
  .pin-container { display: flex; flex-direction: column; align-items: center; margin-top: 10px; }
  .pin-dots { display: flex; gap: 24px; margin-bottom: 40px; }
  .pin-dots .dot { width: 16px; height: 16px; border-radius: 50%; border: 2px solid var(--primary); transition: all 0.2s; }
  .pin-dots .dot.filled { background-color: var(--primary); box-shadow: 0 0 10px rgba(220, 38, 38, 0.5); }
  
  .pin-dots.shake { animation: shake 0.4s cubic-bezier(.36,.07,.19,.97) both; }
  .pin-dots.shake .dot { border-color: var(--danger); }
  .pin-dots.shake .dot.filled { background-color: var(--danger); box-shadow: 0 0 10px rgba(239, 68, 68, 0.5); }
  
  @keyframes shake {
    10%, 90% { transform: translate3d(-2px, 0, 0); }
    20%, 80% { transform: translate3d(4px, 0, 0); }
    30%, 50%, 70% { transform: translate3d(-8px, 0, 0); }
    40%, 60% { transform: translate3d(8px, 0, 0); }
  }

  .keypad { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px 28px; }
  .keypad-btn {
    width: 76px; height: 76px; border-radius: 50%; border: 1px solid transparent;
    background: var(--input-bg); color: var(--text-primary);
    font-size: 28px; font-weight: 500; font-family: inherit;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; transition: all 0.15s ease; user-select: none;
    -webkit-tap-highlight-color: transparent;
  }
  .keypad-btn:active { background: var(--border-color); transform: scale(0.9); }
  .keypad-del { background: transparent; color: var(--text-secondary); }
  .keypad-del:active { background: transparent; color: var(--danger); }
  .keypad-spacer { pointer-events: none; }

  /* Toast Notification */
  .toast-container { position: fixed; top: 24px; left: 50%; transform: translateX(-50%); z-index: 9999; display: flex; flex-direction: column; gap: 12px; pointer-events: none; }
  .toast {
    background: var(--text-primary); color: var(--bg-main); padding: 16px 24px; border-radius: 100px;
    font-weight: 600; font-size: 14px; display: flex; align-items: center; gap: 12px; box-shadow: 0 20px 40px rgba(0,0,0,0.2);
    transform: translateY(-100px); opacity: 0; transition: all 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55);
  }
  .toast.show { transform: translateY(0); opacity: 1; }

  /* Loader & Utils */
  .spinner { animation: spin 1s linear infinite; }
  @keyframes spin { 100% { transform: rotate(360deg); } }
  .hidden { display: none !important; }
  
  /* Skeleton Loading */
  .skeleton { background: linear-gradient(90deg, var(--input-bg) 25%, var(--border-color) 50%, var(--input-bg) 75%); background-size: 200% 100%; animation: skeletonLoad 1.5s infinite; border-radius: 8px; }
  @keyframes skeletonLoad { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

  /* Footer Styling */
  footer { text-align: center; padding: 24px 0; font-size: 14px; color: var(--text-secondary); font-weight: 500; letter-spacing: 0.5px; z-index: 1; line-height: 1.6; }
</style>
</head>

<script type="module">
// ====== FIREBASE INIT ======
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.7.0/firebase-app.js";
import { getDatabase, ref, set, get, remove, onValue } from "https://www.gstatic.com/firebasejs/12.7.0/firebase-database.js";

const app = initializeApp({
  apiKey: "AIzaSyCK6yfVr9VBMGwhbvYMXkJqMoRjo4Om2LM",
  databaseURL: "https://an-quy-default-rtdb.asia-southeast1.firebasedatabase.app"
});
const db = getDatabase(app);

// ====== CONSTANTS ======
const DAYS = ["T2","T3","T4","T5","T6","T7","CN"];
const SHIFTS = ["C1","C2","C3","F1","F2","2C(C1+C2)","2C(C2+C3)"];

// ====== THEME MANAGER ======
const themeBtn = document.getElementById('themeBtn');
const html = document.documentElement;
const sunIcon = document.getElementById('sunIcon');
const moonIcon = document.getElementById('moonIcon');

const savedTheme = localStorage.getItem('theme') || (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
html.setAttribute('data-theme', savedTheme);
updateThemeIcon(savedTheme);

themeBtn.onclick = () => {
  const currentTheme = html.getAttribute('data-theme');
  const newTheme = currentTheme === 'light' ? 'dark' : 'light';
  html.setAttribute('data-theme', newTheme);
  localStorage.setItem('theme', newTheme);
  updateThemeIcon(newTheme);
};

function updateThemeIcon(theme) {
  if(theme === 'dark') { sunIcon.classList.remove('hidden'); moonIcon.classList.add('hidden'); }
  else { sunIcon.classList.add('hidden'); moonIcon.classList.remove('hidden'); }
}

// ====== TOAST MANAGER ======
function showToast(message, type = 'success') {
  const container = document.getElementById('toastContainer');
  const toast = document.createElement('div');
  toast.className = `toast`;
  const colors = { success: '#10b981', error: '#ef4444', warning: '#f59e0b' };
  
  toast.innerHTML = `<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="${colors[type]}" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">${type === 'success' ? '<polyline points="20 6 9 17 4 12"></polyline>' : type === 'error' ? '<line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line>' : '<circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="12"></line><line x1="12" y1="16" x2="12.01" y2="16"></line>'}</svg> <span>${message}</span>`;
  container.appendChild(toast);
  
  requestAnimationFrame(() => toast.classList.add('show'));
  setTimeout(() => {
    toast.classList.remove('show');
    setTimeout(() => toast.remove(), 400);
  }, 3500);
}

// ====== RENDER FORM ======
const form = document.getElementById("form");
DAYS.forEach((d, i) => {
  const isFullWidth = i === 6 ? 'grid-column: span 2;' : '';
  form.innerHTML += `
    <div class="day-card" style="${isFullWidth}">
      <div class="day-header">
        <span>${d === 'CN' ? 'Chủ Nhật' : 'Thứ ' + d.charAt(1)}</span>
      </div>
      <select id="${d}" class="day-select">
        <option value="">-- Nghỉ --</option>
        ${SHIFTS.map(s => `<option value="${s}">${s}</option>`).join("")}
      </select>
    </div>
  `;
});

// ====== LOGIC: LOCK STATUS ======
let manualLock = null;
const lockStatus = document.getElementById("lockStatus");
const submitBtn = document.getElementById("submitBtn");

onValue(ref(db, "settings/lock"), (snap) => {
  manualLock = snap.exists() ? snap.val() : null;
  updateStatusUI();
});

function isRegistrationLocked() {
  if (manualLock === true) return true;
  if (manualLock === false) return false;
  const n = new Date(), d = n.getDay(), h = n.getHours();
  if (d === 5 && h >= 20) return true;
  if (d === 6 || d === 0) return true;
  return false;
}

function updateStatusUI() {
  const isLocked = isRegistrationLocked();
  
  if (isLocked) {
    lockStatus.style.backgroundColor = "var(--primary-light)";
    lockStatus.style.borderColor = "var(--primary-ring)";
    lockStatus.style.color = "var(--danger)";
    lockStatus.innerHTML = `<div class="pulse" style="--pulse-color: rgba(239, 68, 68, 0.6); background: var(--danger);"></div> Đã đóng đăng ký (Mở Thứ 2)`;
    submitBtn.disabled = true;
  } else {
    lockStatus.style.backgroundColor = "rgba(16, 185, 129, 0.1)";
    lockStatus.style.borderColor = "rgba(16, 185, 129, 0.3)";
    lockStatus.style.color = "var(--success)";
    lockStatus.innerHTML = `<div class="pulse" style="--pulse-color: rgba(16, 185, 129, 0.6); background: var(--success);"></div> Đang mở (Đóng 20:00 T6)`;
    submitBtn.disabled = false;
  }
}

// ====== LOGIC: SUBMIT ======
submitBtn.onclick = async () => {
  const name = document.getElementById("name").value.trim();
  if (!name) { document.getElementById("name").focus(); return showToast("Vui lòng nhập họ tên!", "warning"); }
  if (isRegistrationLocked()) return showToast("Hệ thống đang khóa!", "error");

  const lich = {};
  DAYS.forEach(d => { const v = document.getElementById(d).value; if (v) lich[d] = v; });

  if (!Object.keys(lich).length) return showToast("Vui lòng chọn ít nhất 1 ca!", "warning");

  submitBtn.innerHTML = `<svg class="spinner" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="2" x2="12" y2="6"></line><line x1="12" y1="18" x2="12" y2="22"></line><line x1="4.93" y1="4.93" x2="7.76" y2="7.76"></line><line x1="16.24" y1="16.24" x2="19.07" y2="19.07"></line><line x1="2" y1="12" x2="6" y2="12"></line><line x1="18" y1="12" x2="22" y2="12"></line><line x1="4.93" y1="19.07" x2="7.76" y2="16.24"></line><line x1="16.24" y1="7.76" x2="19.07" y2="4.93"></line></svg> Đang đồng bộ...`;
  submitBtn.disabled = true;

  try {
    await set(ref(db, "dangKy/" + name), { lich });
    showToast("Đăng ký thành công! Chúc bạn làm việc hiệu quả.", "success");
    document.getElementById("name").value = "";
    DAYS.forEach(d => document.getElementById(d).value = "");
  } catch (e) {
    showToast("Lỗi mạng: " + e.message, "error");
  } finally {
    submitBtn.innerHTML = `<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></svg> Gửi Đăng Ký`;
    submitBtn.disabled = false;
  }
};

// ====== MANAGER LOGIC & KEYPAD ======
const managerBtn = document.getElementById("managerBtn");
const userCard = document.getElementById("userCard");
const managerBox = document.getElementById("managerBox");
let rawExcelData = "";

managerBtn.onclick = () => {
  userCard.classList.add("hidden");
  managerBox.classList.remove("hidden");
  currentPin = "";
  updateDots();
};

// PIN KEYPAD LOGIC
let currentPin = "";
const pinDots = document.querySelectorAll('.pin-dots .dot');
const pinContainer = document.getElementById('pinDots');
const loginSpinner = document.getElementById('loginSpinner');

function updateDots() {
  pinDots.forEach((dot, index) => {
    if (index < currentPin.length) dot.classList.add('filled');
    else dot.classList.remove('filled');
  });
}

document.querySelectorAll('.keypad-btn[data-val]').forEach(btn => {
  btn.addEventListener('click', () => {
    if (currentPin.length < 4) {
      currentPin += btn.getAttribute('data-val');
      updateDots();
      if (currentPin.length === 4) {
        setTimeout(processLogin, 150); // Auto check when 4 digits entered
      }
    }
  });
});

document.getElementById('keypadDel').addEventListener('click', () => {
  if (currentPin.length > 0) {
    currentPin = currentPin.slice(0, -1);
    updateDots();
  }
});

async function processLogin() {
  if (currentPin !== "2005") {
    pinContainer.classList.add('shake');
    setTimeout(() => pinContainer.classList.remove('shake'), 400);
    showToast("Mã PIN không chính xác!", "error");
    currentPin = "";
    updateDots();
    return;
  }

  // If PIN is correct, fetch data
  loginSpinner.classList.remove('hidden');
  
  try {
    const snap = await get(ref(db, "dangKy"));
    document.getElementById("loginSection").classList.add("hidden");
    document.getElementById("managerHeader").classList.add("hidden");
    document.getElementById("adminPanel").classList.remove("hidden");

    if (!snap.exists()) {
      document.getElementById("excelTable").innerHTML = `<div style="text-align:center; padding: 40px; color: var(--text-secondary);">Chưa có dữ liệu tuần này.</div>`;
      return;
    }

    const data = snap.val();
    let totalUsers = 0; let totalShifts = 0;
    
    // Build Table & Calculate Stats
    let tableHTML = `<div class="table-wrapper"><table><thead><tr><th>Họ & Tên</th>${DAYS.map(d => `<th>${d}</th>`).join('')}</tr></thead><tbody>`;
    rawExcelData = `Họ và Tên\t${DAYS.join('\t')}\n`; 

    Object.entries(data).forEach(([name, obj]) => {
      totalUsers++;
      tableHTML += `<tr><td>${name}</td>`;
      rawExcelData += `${name}\t`;
      DAYS.forEach((day, index) => {
         const shift = obj.lich?.[day] || '-';
         if(shift !== '-') totalShifts++;
         tableHTML += `<td style="color: ${shift === '-' ? 'var(--text-secondary)' : 'var(--primary)'}">${shift}</td>`;
         rawExcelData += `${shift}${index === DAYS.length - 1 ? '' : '\t'}`;
      });
      tableHTML += `</tr>`;
      rawExcelData += `\n`;
    });

    tableHTML += `</tbody></table></div>`;
    document.getElementById("excelTable").innerHTML = tableHTML;
    
    // Animate Stats
    animateValue("totalUsers", 0, totalUsers, 1000);
    animateValue("totalShifts", 0, totalShifts, 1000);
    showToast("Truy cập thành công!", "success");

  } catch (e) { 
    showToast("Lỗi: " + e.message, "error"); 
    currentPin = ""; updateDots();
  } finally {
    loginSpinner.classList.add('hidden');
  }
}

// Copy Data
document.getElementById("copyBtn").onclick = () => {
  if(!rawExcelData) return showToast("Không có dữ liệu để copy", "warning");
  navigator.clipboard.writeText(rawExcelData).then(() => showToast("Đã copy dữ liệu! Dán (Ctrl+V) vào Excel.", "success"));
};

// Admin Actions
document.getElementById("unlockBtn").onclick = async () => { if(confirm("Mở hệ thống?")) { await set(ref(db,"settings/lock"), false); showToast("Đã MỞ!", "success"); } };
document.getElementById("lockBtn").onclick = async () => { if(confirm("Khóa hệ thống?")) { await set(ref(db,"settings/lock"), true); showToast("Đã KHÓA!", "warning"); } };
document.getElementById("clearBtn").onclick = async () => {
  if(confirm("XÓA TOÀN BỘ DỮ LIỆU?\nHành động này không thể hoàn tác!")) {
    await remove(ref(db,"dangKy"));
    showToast("Đã xóa sạch dữ liệu!", "success");
    document.getElementById("excelTable").innerHTML = "";
    document.getElementById("totalUsers").innerText = "0";
    document.getElementById("totalShifts").innerText = "0";
  }
};

// Helper: Animate Numbers
function animateValue(id, start, end, duration) {
  const obj = document.getElementById(id);
  let startTimestamp = null;
  const step = (timestamp) => {
    if (!startTimestamp) startTimestamp = timestamp;
    const progress = Math.min((timestamp - startTimestamp) / duration, 1);
    obj.innerHTML = Math.floor(progress * (end - start) + start);
    if (progress < 1) window.requestAnimationFrame(step);
  };
  window.requestAnimationFrame(step);
}
</script>
