<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WorkShift Pro | System Suspended</title>
    <style>
        /* Giao diện thông báo mặc định */
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background-color: #f8fafc;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            transition: background-color 0.3s;
        }

        .alert-box {
            background: white;
            padding: 32px 24px;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
            text-align: center;
            max-width: 90%;
            width: 380px;
            border: 1px solid rgba(0, 0, 0, 0.05);
        }

        .alert-box p {
            color: #0f172a;
            font-size: 16px;
            font-weight: 600;
            line-height: 1.5;
            margin-bottom: 24px;
            margin-top: 0;
        }

        .btn-ok {
            background-color: #dc2626;
            color: white;
            border: none;
            padding: 12px 32px;
            font-size: 15px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            transition: background-color 0.2s;
            width: 100%;
        }

        .btn-ok:hover {
            background-color: #b91c1c;
        }

        /* Giao diện 404 sau khi nhấn OK */
        .error-404 {
            display: none;
            text-align: center;
            margin-top: 20vh;
            color: black;
        }

        .error-404 h1 {
            font-size: 48px;
            margin-bottom: 10px;
        }

        .error-404 p {
            font-size: 18px;
            color: #555;
        }
    </style>
</head>
<body>

    <!-- Khung thông báo tạm ngưng -->
    <div class="alert-box" id="alertBox">
        <p>Chương trình đã tạm ngưng từ ngày 23/05/2026.<br>Cảm ơn vì đã sử dụng.</p>
        <button class="btn-ok" id="okBtn">OK</button>
    </div>

    <!-- Khung lỗi 404 ẩn -->
    <div class="error-404" id="errorPage">
        <h1>404</h1>
        <p>Not Found</p>
        <p style="font-size: 14px; color: #888; margin-top: 20px;">The requested URL was not found on this server.</p>
    </div>

    <script>
        document.getElementById('okBtn').addEventListener('click', function() {
            // 1. Ẩn hộp thoại thông báo
            document.getElementById('alertBox').style.display = 'none';
            
            // 2. Chuyển nền body thành màu trắng hoàn toàn
            document.body.style.backgroundColor = '#ffffff';
            document.body.style.display = 'block'; 
            
            // 3. Hiển thị thông báo 404
            document.getElementById('errorPage').style.display = 'block';
            
            // Xóa lịch sử trang để người dùng không bấm Back lại trang thông báo được (tuỳ chọn)
            window.history.pushState(null, null, '/404-not-found');
        });
    </script>

</body>
</html>
